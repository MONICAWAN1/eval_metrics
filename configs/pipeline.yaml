# @package _global_
# One-shot generate + evaluate: `python -m paired_slides_eval.pipeline`.
# Select the model with `generator=<name>` (configs/generator/<name>.yaml).
defaults:
  - _self_
  - generator: nicheflow
  - hydra: default

# Inputs (override on the command line).
source: ???  # source slide .h5ad (raw genes + obsm['spatial'])
target: ???  # target slide .h5ad to generate
checkpoint: ???  # trained model checkpoint, passed to the generator

# Evaluation.
classifier:  # optional classifier .ckpt enabling the ct/* groups
groups:  # subset of metric groups (null -> all)
seed: 0
# How ct/acc_real is measured: 'paired' (model-dependent) or 'fixed' (a seeded, model-independent
# sample of real target centroids — use for cross-model-comparable ct/acc_real). See
# docs/comparability_plan.md.
ct_real_reference: paired
ct_real_n: 2000

# Outputs (model-keyed by the chosen generator; Hydra does not chdir, so these are repo-relative).
# Saved metric CSV -> the tracked `reports/` tree; generated cells -> the gitignored `artifacts/` tree.
out: reports/${hydra:runtime.choices.generator}/metrics.csv
generated_out: artifacts/${hydra:runtime.choices.generator}/generated.h5ad
