# @package _global_
# Generation entry point: `python -m paired_slides_eval.generate`.
# Select the model with `generator=<name>` (configs/generator/<name>.yaml).
defaults:
  - _self_
  - generator: nicheflow
  - hydra: default

# Inputs (override on the command line).
source: ???       # source slide .h5ad (raw genes + obsm['spatial'])
target: ???       # target slide .h5ad to generate
checkpoint: ???   # trained model checkpoint, passed to the generator

# Output: where to write the generated cells (.h5ad or .npz). Defaults into the model-keyed
# artifacts tree (gitignored, heavy outputs); the chosen generator name names the subfolder.
# Hydra does not chdir (version_base=None), so this resolves relative to the repo root.
generated_out: artifacts/${hydra:runtime.choices.generator}/generated.h5ad
