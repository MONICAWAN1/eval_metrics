# @package _global_
# Train the class-weighted GCN masked-centroid spatial classifier on ABCA, to test whether
# inverse-frequency weighting fixes the majority-class collapse of abca_spatial_gcn.yaml.
# After training, copy the best checkpoint to
# ckpts/Classifier_Spatial_ABCA_GCN_Weighted.ckpt for the flow eval, and re-run the
# concordance diagnostic (scripts/diagnose_gcn_collapse.py) to compare macro-recall /
# JSD against the unweighted GCN.
defaults:
  - override /data: ct_abca_spatial
  - override /model: classifier_spatial_gcn_weighted
  - override /logger: wandb
  - override /trainer: gpu

logger:
  wandb:
    name: "Classifier_Spatial_ABCA_GCN_Weighted"

trainer:
  max_epochs: 500
  gradient_clip_val: 1.0

model:
  plot_callbacks: False

callbacks:
  model_checkpoint:
    monitor: "val/f1_macro"
    mode: "max"
  early_stopping:
    monitor: "val/f1_macro"
    mode: "max"
