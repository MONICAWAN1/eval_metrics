# @package _global_
defaults:
  - override /data: ct_abca_spatial
  - override /model: classifier_spatial
  - override /logger: wandb
  - override /trainer: gpu

logger:
  wandb:
    name: Classifier_Spatial_ABCA

trainer:
  max_epochs: 500
  gradient_clip_val: 1.0

model:
  plot_callbacks: false

callbacks:
  model_checkpoint:
    monitor: val/f1
  early_stopping:
    monitor: val/f1
